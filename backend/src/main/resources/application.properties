spring.application.name=vigisus

# ── Neo4j ────────────────────────────────────────────────────
spring.neo4j.uri=${NEO4J_URI:bolt://localhost:7687}
spring.neo4j.authentication.username=${NEO4J_USER:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:vigisus123}

# ── PostgreSQL ───────────────────────────────────────────────
spring.datasource.url=${PG_URL:jdbc:postgresql://localhost:5432/vigisus}
spring.datasource.username=${PG_USER:vigisus}
spring.datasource.password=${PG_PASSWORD:vigisus123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── DATASUS API (CNES + BNAFAR/HORUS) ────────────────────────
datasus.api.base-url=https://apidadosabertos.saude.gov.br

# ── Portal da Transparência ───────────────────────────────────
# Registre sua chave em: https://portaldatransparencia.gov.br/api-de-dados
transparencia.api.base-url=https://api.portaldatransparencia.gov.br/api-de-dados
transparencia.api.key=${TRANSPARENCIA_API_KEY:}

# ── TCU Certidões (APF) ───────────────────────────────────────
tcu.api.base-url=https://certidoes-apf.apps.tcu.gov.br

# ── Dados Abertos Saúde (SIOPS + Economia da Saúde) ──────────
dados.abertos.saude.base-url=https://dadosabertos.saude.gov.br

# ── Servidor ─────────────────────────────────────────────────
server.port=8080
