services:

  # ── Banco de grafo ──────────────────────────────────────────
  neo4j:
    image: neo4j:5
    container_name: vigisus-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-vigisus123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_max__size: 512m
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - ./backend/src/main/resources/cypher:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Banco relacional ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: vigisus-postgres
    environment:
      POSTGRES_DB: ${PG_DB:-vigisus}
      POSTGRES_USER: ${PG_USER:-vigisus}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-vigisus123}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-vigisus}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend Spring Boot ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vigisus-backend
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-vigisus123}
      PG_URL: jdbc:postgresql://postgres:5432/${PG_DB:-vigisus}
      PG_USER: ${PG_USER:-vigisus}
      PG_PASSWORD: ${PG_PASSWORD:-vigisus123}
    ports:
      - "8080:8080"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s

  # ── Frontend Angular (nginx) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vigisus-frontend
    ports:
      - "4200:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  neo4j_data:
  pg_data:
