server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy para API do governo (DATASUS) — elimina CORS em produção
    location /api-gov/ {
        proxy_pass          https://apidadosabertos.saude.gov.br/;
        proxy_ssl_server_name on;
        proxy_set_header    Host apidadosabertos.saude.gov.br;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_hide_header   Access-Control-Allow-Origin;
        add_header          Access-Control-Allow-Origin *;
    }

    # Proxy para o backend local
    location /api/ {
        proxy_pass          http://backend:8080/;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  60s;
    }

    # Angular SPA — todas as rotas caem no index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(js|css|png|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
