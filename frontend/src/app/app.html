<div class="min-h-screen bg-gray-950 text-gray-200 flex flex-col items-center justify-center p-4">

  <!-- Logo Angular com SVG inline e efeito glow -->
  <div class="relative mb-6 group">
    <div class="absolute inset-0 bg-emerald-500/20 blur-xl rounded-full group-hover:bg-emerald-500/30 transition-all duration-300"></div>
    <svg
      viewBox="0 0 250 250"
      fill="none"
      xmlns="http://www.w3.org/2000/svg"
      class="w-20 h-20 relative z-10 transition-transform duration-300 group-hover:scale-110"
    >
      <path d="M125 30L31.9 63.2L45.5 186.3L125 230L204.5 186.3L218.1 63.2L125 30Z" fill="#DD0031" stroke="#C3002F" stroke-width="2"/>
      <path d="M125 30L125 52.2L125 52.1L125 230L204.5 186.3L218.1 63.2L125 30Z" fill="#C3002F"/>
      <path d="M125 52.1L90.9 172.8H108.1L113.9 154.2H136.1L141.9 172.8H159.1L125 52.1ZM130.9 141H119.1L125 122.9L130.9 141Z" fill="white"/>
    </svg>
  </div>

  <!-- Título com gradiente e brilho sutil -->
  <h1 class="text-4xl md:text-5xl font-bold bg-gradient-to-r from-emerald-400 to-emerald-600 bg-clip-text text-transparent mb-3 text-center">
    {{ appName }}
  </h1>

  <!-- Descrição mais elegante -->
  <p class="text-gray-400 text-center max-w-md mb-8 text-lg leading-relaxed">
    Plataforma de análise de dados do SUS baseada em grafos.
  </p>

  <!-- Botão com efeito de borda e animação -->
  <button class="group relative px-8 py-3 rounded-lg font-medium text-gray-900 bg-gradient-to-r from-emerald-400 to-emerald-500 hover:from-emerald-500 hover:to-emerald-600 transition-all duration-200 shadow-lg shadow-emerald-500/25 hover:shadow-emerald-500/40 transform hover:-translate-y-0.5">
    <span class="relative z-10 flex items-center gap-2">
      Entrar no sistema
      <svg class="w-4 h-4 transition-transform duration-200 group-hover:translate-x-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </span>
  </button>

  <!-- Badge opcional para dar um toque extra -->
  <div class="mt-8 text-xs text-gray-500 flex gap-3">
    <span class="flex items-center gap-1">
      <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
      Angular 19+
    </span>
    <span class="flex items-center gap-1">
      <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
      Graph Database
    </span>
  </div>
</div>
